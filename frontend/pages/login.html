<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — Market Databank</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">Market Databank</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
    </div>
  </nav>

  <div class="container" style="max-width:400px;margin-top:4rem">
    <div class="card">
      <h2 style="margin-bottom:1.5rem">Admin login</h2>
      <div id="login-message"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••"/>
      </div>
      <button class="btn-primary" style="width:100%" onclick="adminLogin()">Login</button>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    async function adminLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('login-message');
      try {
        const res = await fetch('http://localhost:5000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message);
        localStorage.setItem('adminToken', data.token);
        localStorage.setItem('adminName', data.name);
        window.location.href = 'admin.html';
      } catch (err) {
        msg.innerHTML = `<div class="alert-error">${err.message}</div>`;
      }
    }
  </script>
</body>
</html>
